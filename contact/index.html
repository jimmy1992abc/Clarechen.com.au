<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#070A12" />
  <title>Contact Me</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/styles.css">

  <style>
    :root{
      --bg0:#050713;
      --bg1:#070A12;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(0,0,0,.35);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.95);
      --muted: rgba(255,255,255,.60);
      --muted2: rgba(255,255,255,.40);
      --glow: rgba(255,255,255,.18);
      --cyan: rgba(34,211,238,.18);
      --indigo: rgba(99,102,241,.14);
      --fuchsia: rgba(217,70,239,.14);
      --grid: rgba(255,255,255,.06);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 15%, var(--cyan), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, var(--fuchsia), transparent 55%),
        radial-gradient(1100px 700px at 50% 90%, var(--indigo), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(980px, 100%);
      position:relative;
    }

    .card{
      position:relative;
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:28px;
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
      background-size:24px 24px;
      opacity:.45;
      mask-image: radial-gradient(circle at 50% 30%, black 0%, black 38%, transparent 75%);
      pointer-events:none;
    }

    .inner{ 
      position:relative; 
      padding:34px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:400px;
    }
    @media (max-width:640px){ .inner{ padding:22px; } }

    .title{
      letter-spacing:.35em;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

    .sub{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
      line-height:1.4;
      text-align:center;
    }

    .contact-button{
      margin-top:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:16px 48px;
      border:1px solid var(--border);
      background:var(--panel2);
      border-radius:20px;
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      letter-spacing:.15em;
      text-shadow: 0 0 22px var(--glow);
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      cursor:pointer;
    }

    .contact-button:hover{
      border-color:rgba(34,211,238,.5);
      box-shadow: 0 10px 40px rgba(34,211,238,.2);
      background:rgba(34,211,238,.1);
    }

    .footer{
      margin-top:14px;
      font-size:12px;
      color:rgba(255,255,255,.35);
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="stage">
    <nav class="toolbar" aria-label="Primary">
      <a class="tool-pill" href="/">Home</a>
      <a class="tool-pill" href="/event/">Event</a>
      <a class="tool-pill active" href="/contact/">Contact</a>
    </nav>

    <section class="card">
      <div class="inner">
        <div class="title">GET IN TOUCH</div>
        <div class="sub">I'd love to hear from you</div>
        <a href="mailto:clarechenxy26@gmail.com" class="contact-button">Contact Me</a>
      </div>
    </section>

    <div class="footer">Integrity • Brave • Justice</div>
  </div>
</body>
</html>
