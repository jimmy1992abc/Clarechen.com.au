<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>Event — Clare Chen</title>
  <meta name="description" content="Event details and registration" />

  <!-- Open Graph -->
  <meta property="og:title" content="Event — Clare Chen" />
  <meta property="og:description" content="Join us for an upcoming event." />
  <meta property="og:type" content="website" />

  <!-- Fonts (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../assets/css/site.css" />
  <style>
    /* Event detail page specific styles */
    .event-hero {
      padding: 80px 0 60px;
      text-align: center;
    }

    .event-hero__title {
      font-family: var(--font-serif);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 600;
      margin: 0 0 24px;
      letter-spacing: -0.02em;
    }

    .event-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 24px;
      margin: 48px 0;
      padding: 32px;
      background: rgba(118,169,255,.08);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .event-meta__item {
      text-align: center;
    }

    .event-meta__label {
      display: block;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .event-meta__value {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .event-actions {
      display: flex;
      justify-content: center;
      margin: 32px 0 0;
    }

    .event-rsvp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 26px;
      border: 1px solid rgba(118,169,255,.28);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(118,169,255,.2), rgba(138,91,255,.16));
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .event-rsvp:hover {
      transform: translateY(-2px);
      border-color: rgba(118,169,255,.48);
      box-shadow: 0 24px 48px rgba(0,0,0,.28);
    }

    .event-content {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .event-content h2 {
      font-family: var(--font-serif);
      font-size: 28px;
      margin: 40px 0 16px;
      color: var(--text);
    }

    .event-content p {
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 16px;
    }

    .event-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }

    .event-content li {
      padding: 8px 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .event-content li::before {
      content: "→ ";
      color: var(--accent);
      margin-right: 8px;
    }

    .jotform-container {
      width: 100%;
      margin: 60px auto;
      padding: clamp(24px, 4vw, 40px);
      background: rgba(118,169,255,.06);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .jotform-container h3 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 24px;
      color: var(--text);
    }

    .jotform-container iframe {
      display: block;
      width: 100%;
      min-height: 640px;
      border: none;
      border-radius: 12px;
      overflow: hidden;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      margin-bottom: 24px;
      font-size: 14px;
      transition: gap 0.2s ease;
    }

    .back-link:hover {
      gap: 12px;
    }

    .back-link::before {
      content: "←";
    }

    .loading-message {
      text-align: center;
      color: var(--muted);
      padding: 60px 24px;
    }

    .error-message {
      text-align: center;
      color: #ff6b6b;
      padding: 60px 24px;
    }
  </style>
</head>

<body>
  <!-- Top progress indicator -->
  <div class="scrollbar" aria-hidden="true">
    <div class="scrollbar__bar" id="scrollbarBar"></div>
  </div>

  <header class="header" id="header">
    <div class="container header__inner">
      <a class="brand" href="/" aria-label="Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">Clare Chen</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navMenu">
          <span class="nav__toggleLines" aria-hidden="true"></span>
          <span class="sr-only">Open menu</span>
        </button>

        <div class="nav__menu" id="navMenu">
          <a class="nav__link" href="/#about">About</a>
          <a class="nav__link" href="/#event">Events</a>
          <a class="nav__link" href="/#writing">Writing</a>
          <a class="nav__link" href="/#contact">Contact</a>
          <a class="btn btn--ghost" href="/#contact">Let's talk</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="event-hero">
      <div class="container">
        <a class="back-link" href="/#event">Back to events</a>
        
        <div id="eventContent">
          <div class="loading-message">Loading event...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left">
        <span class="brand__dot" aria-hidden="true"></span>
        <span>© <span id="year"></span> Clarechen.com.au</span>
      </div>
      <div class="footer__right">
        <a class="link link--muted" href="#top">Back to top</a>
      </div>
    </div>
  </footer>

  <script src="../../assets/js/site.js" defer></script>
  <script defer>
    // Set year in footer
    const year = document.getElementById('year');
    if (year) year.textContent = new Date().getFullYear();

    // Parse markdown YAML frontmatter
    function parseMarkdownFile(text) {
      const frontmatterRegex = /^---\n([\s\S]*?)\n---\n([\s\S]*)$/;
      const match = text.match(frontmatterRegex);
      
      if (!match) {
        console.error('[Event Template] No frontmatter found');
        return null;
      }

      const [, frontmatterStr, content] = match;
      
      // Parse YAML
      const frontmatter = {};
      frontmatterStr.split('\n').forEach(line => {
        const [key, ...valueParts] = line.split(':');
        if (key && valueParts.length > 0) {
          let value = valueParts.join(':').trim();
          value = value.replace(/^["'](.*)["']$/, '$1');
          if (value === 'true') value = true;
          if (value === 'false') value = false;
          frontmatter[key.trim()] = value;
        }
      });

      return { frontmatter, content };
    }

    // Format date as "15 April 2026"
    function formatDateLong(dateString) {
      const date = new Date(dateString + 'T00:00:00');
      return new Intl.DateTimeFormat('en-US', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    // Convert markdown to HTML
    function parseMarkdownContent(markdown) {
      let html = markdown
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^\- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/^(?!<[hu]|<p|<ul)(.+)$/gm, '<p>$1</p>');
      
      return html;
    }

    function buildJotformSrc(formId) {
      const parentURL = encodeURIComponent(window.location.href);
      return `https://form.jotform.com/${formId}?parentURL=${parentURL}&jsForm=true`;
    }

    function hasJotformId(value) {
      if (typeof value !== 'string') {
        return false;
      }

      const normalizedValue = value.trim();
      return normalizedValue !== '' && normalizedValue.toLowerCase() !== 'null';
    }

    function bindJotformResize(formId) {
      const iframeId = `jotform-${formId}`;
      const iframe = document.getElementById(iframeId);

      if (!iframe) {
        return;
      }

      window.__activeJotformId = String(formId);

      if (window.__jotformResizeBound) {
        return;
      }

      window.addEventListener('message', (event) => {
        if (typeof event.data !== 'string') {
          return;
        }

        const args = event.data.split(':');
        if (args.length < 3 || args[2] !== window.__activeJotformId) {
          return;
        }

        const activeIframe = document.getElementById(`jotform-${window.__activeJotformId}`);
        if (!activeIframe) {
          return;
        }

        switch (args[0]) {
          case 'setHeight':
            activeIframe.style.height = `${args[1]}px`;
            break;
          case 'setMinHeight':
            activeIframe.style.minHeight = `${args[1]}px`;
            break;
          case 'collapseErrorPage':
            if (activeIframe.clientHeight > window.innerHeight) {
              activeIframe.style.height = `${window.innerHeight}px`;
            }
            break;
          default:
            break;
        }
      }, false);

      window.__jotformResizeBound = true;
    }

    // Extract slug from URL path
    function getEventSlug() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      // Find the part after 'event'
      const eventIndex = pathParts.indexOf('event');
      if (eventIndex !== -1 && eventIndex < pathParts.length - 1) {
        return pathParts[eventIndex + 1];
      }
      return null;
    }

    // Load and render event
    async function loadEventPage() {
      try {
        const slug = getEventSlug();
        console.log('[Event Template] Slug:', slug);

        if (!slug) {
          document.getElementById('eventContent').innerHTML = '<div class="error-message">Event not found.</div>';
          return;
        }

        // Fetch event markdown from GitHub raw content
        const mdPath = `https://raw.githubusercontent.com/jimmy1992abc/Clarechen.com.au/main/event/${slug}/${slug}.md`;
        console.log('[Event Template] Fetching:', mdPath);
        
        const response = await fetch(mdPath);
        if (!response.ok) {
          throw new Error(`Failed to fetch ${mdPath}: ${response.status}`);
        }

        const text = await response.text();
        const parsed = parseMarkdownFile(text);

        if (!parsed) {
          document.getElementById('eventContent').innerHTML = '<div class="error-message">Error loading event.</div>';
          return;
        }

        const { frontmatter, content } = parsed;

        // Update page title and meta tags
        document.title = `${frontmatter.title} — Clare Chen`;
        document.querySelector('meta[property="og:title"]').setAttribute('content', `${frontmatter.title} — Clare Chen`);
        document.querySelector('meta[property="og:description"]').setAttribute('content', frontmatter.description);

        const dateFormatted = formatDateLong(frontmatter.date);
        const showJotform = hasJotformId(frontmatter.jotformId);

        // Build HTML
        const contentHtml = parseMarkdownContent(content);
        const actionsHtml = showJotform ? `
          <div class="event-actions">
            <a class="event-rsvp" href="#rsvp-start">RSVP Now</a>
          </div>
        ` : '';
        const jotformSection = showJotform ? `
          <div class="jotform-container" id="rsvp-start">
            <h3>Register for this event</h3>
            <iframe
              id="jotform-${frontmatter.jotformId}"
              name="${frontmatter.jotformId}"
              title="${frontmatter.title} registration form"
              src="${buildJotformSrc(frontmatter.jotformId)}"
              scrolling="no"
              allow="geolocation; microphone; camera; fullscreen; payment"
              allowtransparency="true"
            ></iframe>
          </div>
        ` : '';

        const html = `
          <h1 class="event-hero__title">${frontmatter.title}</h1>
          
          <div class="event-meta">
            <div class="event-meta__item">
              <span class="event-meta__label">Date</span>
              <span class="event-meta__value">${dateFormatted}</span>
            </div>
            <div class="event-meta__item">
              <span class="event-meta__label">Time</span>
              <span class="event-meta__value">${frontmatter.time}</span>
            </div>
            <div class="event-meta__item">
              <span class="event-meta__label">Location</span>
              <span class="event-meta__value">${frontmatter.location}</span>
            </div>
          </div>

          ${actionsHtml}

          <div class="event-content">
            ${contentHtml}
          </div>

          ${jotformSection}
        `;

        document.getElementById('eventContent').innerHTML = html;
        if (showJotform) {
          bindJotformResize(frontmatter.jotformId);
        }
        console.log('[Event Template] Event loaded successfully');

      } catch (error) {
        console.error('[Event Template] Error loading event:', error);
        document.getElementById('eventContent').innerHTML = '<div class="error-message">Error loading event. Please refresh the page.</div>';
      }
    }

    // Load event when page is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadEventPage);
    } else {
      loadEventPage();
    }
  </script>
</body>
</html>
