<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#070A12" />
  <title>Clare Chen</title>

  <!-- Optional: nicer “digital” mono font (safe to remove) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/styles.css">

  <style>
    :root{
      --bg0:#050713;
      --bg1:#070A12;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(0,0,0,.35);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.95);
      --muted: rgba(255,255,255,.60);
      --muted2: rgba(255,255,255,.40);
      --glow: rgba(255,255,255,.18);
      --cyan: rgba(34,211,238,.18);
      --indigo: rgba(99,102,241,.14);
      --fuchsia: rgba(217,70,239,.14);
      --grid: rgba(255,255,255,.06);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 15%, var(--cyan), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, var(--fuchsia), transparent 55%),
        radial-gradient(1100px 700px at 50% 90%, var(--indigo), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(980px, 100%);
      position:relative;
    }

    .card{
      position:relative;
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:28px;
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }

    /* subtle grid */
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
      background-size:24px 24px;
      opacity:.45;
      mask-image: radial-gradient(circle at 50% 30%, black 0%, black 38%, transparent 75%);
      pointer-events:none;
    }

    .inner{ position:relative; padding:34px; }
    @media (max-width:640px){ .inner{ padding:22px; } }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .title{
      letter-spacing:.35em;
      font-size:12px;
      color:var(--muted);
    }

    .sub{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
      line-height:1.4;
    }

    .right{
      text-align:right;
      font-size:12px;
      color:var(--muted2);
    }

    .right .clock{
      font-size:13px;
      color:var(--muted);
    }

    .grid{
      margin-top:28px;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:14px;
    }
    @media (max-width:860px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
      .grid .block:last-child{ grid-column: 1 / -1; }
    }

    .block{
      border:1px solid var(--border);
      background:var(--panel2);
      border-radius:20px;
      padding:16px 16px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .label{
      font-size:10px;
      letter-spacing:.35em;
      color:var(--muted2);
    }

    .value{
      margin-top:8px;
      font-size: clamp(34px, 4vw, 56px);
      color:var(--text);
      text-shadow: 0 0 22px var(--glow);
      line-height:1;
    }

    .metaRow{
      margin-top:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
    }

    .dot{
      width:8px; height:8px; border-radius:999px;
      background:#34d399;
      box-shadow: 0 0 16px rgba(52,211,153,.5);
    }
    .dot.future{
      background:#fbbf24;
      box-shadow: 0 0 16px rgba(251,191,36,.5);
    }

    .footer{
      margin-top:14px;
      font-size:12px;
      color:rgba(255,255,255,.35);
      text-align:center;
    }

    .hint{
      margin-top:22px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius:18px;
      padding:14px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    code{
      font-family:inherit;
      color:rgba(255,255,255,.85);
    }
  </style>
</head>

<body>
  <div class="stage">
    <nav class="toolbar" aria-label="Primary">
      <a class="tool-pill active" href="/">Home</a>
      <a class="tool-pill" href="/event/">Event</a>
      <a class="tool-pill" href="/contact/">Contact</a>
    </nav>

    <section class="card">
      <div class="inner">
        <div class="top">
          <div>
            <div class="title" id="title">BORN SINCE</div>
            <div class="sub" id="subtitle">Loading…</div>
          </div>

          <div class="right">
            <div class="clock" id="nowClock">--:--:--</div>
            <div>LIVE</div>
          </div>
        </div>

        <div class="grid" aria-label="timer blocks">
          <div class="block">
            <div class="label">YEARS</div>
            <div class="value" id="years">0</div>
          </div>
          <div class="block">
            <div class="label">DAYS</div>
            <div class="value" id="days">0</div>
          </div>
          <div class="block">
            <div class="label">HRS</div>
            <div class="value" id="hours">00</div>
          </div>
          <div class="block">
            <div class="label">MIN</div>
            <div class="value" id="mins">00</div>
          </div>
          <div class="block">
            <div class="label">SEC</div>
            <div class="value" id="secs">00</div>
          </div>
        </div>

        <div class="metaRow">
          <div class="pill">
            <span class="dot" id="dot"></span>
            <span id="modeText">—</span>
          </div>

          <div>
            total days: <span id="totalDays" style="color:rgba(255,255,255,.9)">0</span>
          </div>
        </div>

        <div class="hint">
          Welcome to the world
        </div>
      </div>
    </section>

    <div class="footer">Integrity • Brave • Justice</div>
  </div>

  <script>
    // =========================
    // ✅ CONFIG (hardcode here)
    // =========================
    const TITLE = "BORN SINCE";
    const START_DATE_DDMMYYYY = "16012026"; // DDMMYYYY e.g. 01012020
    const START_TIME_HHMM     = "07:23";    // HH:MM (24h) e.g. 09:30
    const USE_UTC             = false;      // true = interpret date/time as UTC

    // Optional: show date in subtitle with your preferred format
    const DISPLAY_LOCALE = "en-AU"; // e.g. "en-AU"

    // =========================
    // Helpers
    // =========================
    const $ = (id) => document.getElementById(id);

    function pad2(n){ return String(n).padStart(2, "0"); }

    function parseDDMMYYYY(s){
      s = (s || "").trim();
      if(!/^\d{8}$/.test(s)) return null;
      const dd = Number(s.slice(0,2));
      const mm = Number(s.slice(2,4));
      const yyyy = Number(s.slice(4,8));
      if(mm < 1 || mm > 12) return null;
      if(dd < 1 || dd > 31) return null;
      const d = new Date(yyyy, mm-1, dd);
      if(d.getFullYear() !== yyyy || d.getMonth() !== mm-1 || d.getDate() !== dd) return null;
      return {dd, mm, yyyy};
    }

    function buildStartDate(dateParts, hh, min, useUTC){
      const {dd, mm, yyyy} = dateParts;
      return useUTC
        ? new Date(Date.UTC(yyyy, mm-1, dd, hh, min, 0))
        : new Date(yyyy, mm-1, dd, hh, min, 0);
    }

    function splitDuration(msAbs){
      const totalSeconds = Math.floor(msAbs / 1000);
      const seconds = totalSeconds % 60;
      const totalMinutes = Math.floor(totalSeconds / 60);
      const minutes = totalMinutes % 60;
      const totalHours = Math.floor(totalMinutes / 60);
      const hours = totalHours % 24;
      const totalDays = Math.floor(totalHours / 24);
      // Simple stable display: years = 365 days
      const years = Math.floor(totalDays / 365);
      const days = totalDays % 365;
      return { years, days, hours, minutes, seconds, totalDays };
    }

    // =========================
    // Init
    // =========================
    $("title").textContent = TITLE;

    const dateParts = parseDDMMYYYY(START_DATE_DDMMYYYY);
    const timeMatch = /^\s*(\d{1,2}):(\d{2})\s*$/.exec(START_TIME_HHMM);

    if(!dateParts || !timeMatch){
      $("subtitle").textContent = "Invalid START_DATE_DDMMYYYY or START_TIME_HHMM.";
      $("modeText").textContent = "Fix config in <script>.";
      $("dot").classList.add("future");
      throw new Error("Bad config");
    }

    const hh = Number(timeMatch[1]);
    const min = Number(timeMatch[2]);
    if(hh<0 || hh>23 || min<0 || min>59){
      $("subtitle").textContent = "Time must be HH:MM (00:00–23:59).";
      $("modeText").textContent = "Fix config in <script>.";
      $("dot").classList.add("future");
      throw new Error("Bad time");
    }

    const start = buildStartDate(dateParts, hh, min, USE_UTC);

    function tick(){
      const now = new Date();
      $("nowClock").textContent = now.toLocaleTimeString(DISPLAY_LOCALE, { hour12:false });

      const delta = Date.now() - start.getTime();
      const isFuture = delta < 0;
      const parts = splitDuration(Math.abs(delta));

      $("years").textContent = String(parts.years);
      $("days").textContent  = String(parts.days);
      $("hours").textContent = pad2(parts.hours);
      $("mins").textContent  = pad2(parts.minutes);
      $("secs").textContent  = pad2(parts.seconds);
      $("totalDays").textContent = String(parts.totalDays);

      $("dot").classList.toggle("future", isFuture);
      $("modeText").textContent = isFuture ? "Counting down to start" : "Counting up since start";

      const tzLabel = USE_UTC ? "UTC" : "Local";
      $("subtitle").textContent =
        (isFuture ? "Starts at " : "Started at ") +
        start.toLocaleString(DISPLAY_LOCALE, { hour12:false }) +
        " (" + tzLabel + ")";
    }

    tick();
    setInterval(tick, 250);
  </script>
</body>
</html>
